---
ls:
  .adoc: kebab-case | SCREAMING_SNAKE_CASE | PascalCase
  .puml: kebab-case

  .md: kebab-case | SCREAMING_SNAKE_CASE
  .prompt.md: kebab-case | SCREAMING_SNAKE_CASE

  .conf: kebab-case
  .go: snake_case
  .json: kebab-case
  .rb: kebab-case
  .tf: kebab-case
  .yml: kebab-case
  .yaml: kebab-case
  .toml: kebab-case
  .feature: kebab-case

  .java: PascalCase
  .kt: PascalCase
  .sh: kebab-case

  .css: kebab-case
  .html: kebab-case
  .js: kebab-case
  .hbs: kebab-case
  .svg: kebab-case

  Dockerfile: PascalCase
  Vagrantfile: PascalCase

  # Allow only versioned Ubuntu Dockerfiles in `tests` folder
  # Adjust rule in case of adding other OS Dockerfiles (e.g. for Arch)
  tests/Dockerfile.*: regex:^Dockerfile\.ubuntu(-[0-9]{2}\.[0-9]{2})?$

  .babelrc: lowercase
  .env: lowercase
  .dockerignore: lowercase
  .folderslintrc: lowercase
  .gitignore: lowercase
  .gitkeep: lowercase
  .shellcheckrc: lowercase

ignore:
  # commons
  - .git
  - .idea
  - .vscode
  - node_modules
  - target

  - .task

  - .github/skills/.markdownlint.yml

  # linter definitions etc.
  - .editorconfig
  - .ansible-lint.yml
  - .lychee.toml
  - .ls-lint.yml
  - .markdownlint.yml
  - .yamllint.yml
  - .pre-commit-config.yaml
  - .releaserc.js
  - tests/.hadolint.yml
