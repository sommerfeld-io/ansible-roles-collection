---
- name: Conky  ----  Create directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ default_user }}"
    group: "{{ default_user }}"
    mode: u=rwx,g=rx,o=
  with_items:
    - "/home/{{ default_user }}/.config/conky"

- name: Conky  ----  Copy files
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: "{{ default_user }}"
    group: "{{ default_user }}"
    mode: u=rw,g=r,o=r
  loop:
    - { src: "../files/docker.conkyrc", dest: "/home/{{ default_user }}/.config/conky/docker.conkyrc" }
    - { src: "../files/host.conkyrc", dest: "/home/{{ default_user }}/.config/conky/host.conkyrc" }
    - { src: "../files/autostart/conky-launcher.desktop", dest: "/home/{{ default_user }}/.config/autostart/conky-launcher.desktop" }
