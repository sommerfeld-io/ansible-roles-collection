---
- name: Node  ----  Ubuntu
  when: ansible_facts['os_family'] == "Debian"
  block:
    - name: Node  ----  Ubuntu  ----  Add NodeSource GPG key
      ansible.builtin.get_url:
        url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
        dest: /etc/apt/keyrings/nodesource.asc
        mode: '0644'

    - name: Node  ----  Ubuntu ----  Add apt repository (OS-codename {{ codename }})
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/nodesource.asc] https://deb.nodesource.com/node_{{ node_version }} nodistro main"
        filename: nodesource
        state: present
        mode: '0644'
      vars:
        codename: "{{ ansible_facts['distribution_release'] }}"

    - name: Node  ----  Ubuntu ----  Install
      ansible.builtin.apt:
        name:
          - nodejs
        state: present
        update_cache: true

    - name: Node  ----  Ubuntu ----  Verify installation
      ansible.builtin.command: node --version
      register: node_v
      changed_when: false

    - name: Node  ----  Ubuntu ----  Print Node.js version
      ansible.builtin.debug:
        msg: "{{ node_v.stdout }}"

- name: Node  ----  Modules  ----  Ensure user-local npm prefix exists
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ default_user }}"
    group: "{{ default_user }}"
    mode: u=rwx,g=rx,o=
  loop:
    - "/home/{{ default_user }}/.local"
    - "/home/{{ default_user }}/.local/bin"
    - "/home/{{ default_user }}/.local/lib"

- name: Node  ----  Modules  ----  Ensure user-local npm bin directory is on PATH
  ansible.builtin.lineinfile:
    create: true
    mode: u=rw,g=,o=
    dest: "/home/{{ default_user }}/.bashrc"
    line: 'export PATH="$HOME/.local/bin:$PATH"'
    state: present
