---
- name: Node  ----  Ubuntu
  when: ansible_os_family == "Debian"
  block:
    - name: Node  ----  Ubuntu  ----  Add NodeSource GPG key
      ansible.builtin.get_url:
        url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
        dest: /etc/apt/keyrings/nodesource.asc
        mode: '0644'

    - name: Node  ----  Ubuntu ----  Add apt repository (OS-codename {{ codename }})
      ansible.builtin.apt_repository:apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/nodesource.asc] https://deb.nodesource.com/node_{{ node_version }} nodistro main"
        filename: nodesource
        state: present
        mode: '0644'

    - name: Node  ----  Ubuntu ----  Install
      ansible.builtin.apt:
        name:
          - nodejs
        state: present
        update_cache: true

    - name: Node  ----  Ubuntu ----  Verify installation
      ansible.builtin.command: node -v
      register: node_v
      changed_when: false

    - name: Node  ----  Ubuntu ----  Print Node.js version
      ansible.builtin.debug:
        msg: "{{ node_v.stdout }}"
