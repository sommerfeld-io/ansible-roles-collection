---
- name: Ollama  ----  Install via official script
  ansible.builtin.shell: curl -fsSL https://ollama.com/install.sh | sh
  args:
    executable: /bin/bash
    creates: /usr/local/bin/ollama

- name: Ollama  ----  Verify version
  ansible.builtin.command: ollama --version
  register: ollama_version
  changed_when: false

- name: Ollama  ----  Print version
  ansible.builtin.debug:
    msg: "{{ ollama_version.stdout }}"

- name: Ollama  ----  Models  ----  Pull LLM models
  ansible.builtin.shell: "ollama pull {{ item }}"
  args:
    executable: /bin/bash
  loop: "{{ ollama_models }}"
  register: pull_result
  changed_when: "'success' in pull_result.stdout"
