---
- name: Ollama  ----  Install
  block:
    - name: Ollama  ----  Install  ----  Install via official script
      ansible.builtin.shell: curl -fsSL https://ollama.com/install.sh | sh
      args:
        executable: /bin/bash
        creates: /usr/local/bin/ollama

    - name: Ollama  ----  Install  ----  Verify version
      ansible.builtin.command: ollama --version
      register: ollama_version
      changed_when: false

    - name: Ollama  ----  Install  ----  Print version
      ansible.builtin.debug:
        msg: "{{ ollama_version.stdout }}"

- name: Ollama  ----  systemd
  vars:
    ollama_user: ollama
    ollama_group: ollama
    ollama_service_name: ollama
  block:
    - name: Ollama  ----  systemd  ----  Create ollama group
      ansible.builtin.group:
        name: "{{ ollama_group }}"
        system: true

    - name: Ollama  ----  systemd  ----  Create ollama user
      ansible.builtin.user:
        name: "{{ ollama_user }}"
        system: true
        shell: /bin/false
        create_home: true
        home: /usr/share/ollama
        group: "{{ ollama_group }}"

    - name: Ollama  ----  systemd  ----  Add current user to ollama group
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: "{{ ollama_group }}"
        append: true

    - name: Ollama  ----  systemd  ----  Create systemd service file
      ansible.builtin.copy:
        dest: /etc/systemd/system/ollama.service
        content: |
          [Unit]
          Description=Ollama Service
          After=network-online.target

          [Service]
          ExecStart=/usr/bin/ollama serve
          User={{ ollama_user }}
          Group={{ ollama_group }}
          Restart=always
          RestartSec=3
          Environment="PATH={{ ansible_env.PATH }}"

          [Install]
          WantedBy=multi-user.target
        owner: root
        group: root
        mode: "0644"

    - name: Ollama  ----  systemd  ----  Enable and start service
      ansible.builtin.systemd:
        name: "{{ ollama_service_name }}"
        state: started
        enabled: true
        daemon_reload: true


- name: Ollama  ----  Models
  block:
    - name: Ollama  ----  Models  ----  Pull LLM models
      ansible.builtin.shell: "ollama pull {{ item }}"
      args:
        executable: /bin/bash
      loop: "{{ ollama_models }}"
      register: pull_result
      changed_when: "'success' in pull_result.stdout"
