---
- name: Atuin  ----  Install
  block:
    - name: Atuin  ----  Install  ----  Download and execute the atuin setup script
      ansible.builtin.shell:
        cmd: "curl --proto '=https' --tlsv1.2 -LsSf https://setup.atuin.sh | bash -s -- --non-interactive"
      args:
        executable: /bin/bash
        creates: "/home/{{ default_user }}/.atuin/bin/atuin"

    - name: Atuin  ----  Install  ----  Set executable permissions on binary
      ansible.builtin.file:
        path: "/home/{{ default_user }}/.atuin/bin/atuin"
        mode: '0755'
      ignore_errors: true

    - name: Atuin  ----  Install  ----  Check if config file exists
      stat:
        path: "/home/{{ default_user }}/.config/atuin/config.toml"
      register: atuin_config_file

    - name: Atuin  ----  Install  ----  Set session as default scope
      ansible.builtin.lineinfile:
        dest: "/home/{{ default_user }}/.config/atuin/config.toml"
        state: present
        line: "{{ item }}"
      with_items:
        - filters = [ "session", "directory", "workspace", "host",  "global" ]
      when: atuin_config_file.stat.exists

- name: Atuin  ----  Cleanup
  block:

    - name: Atuin  ----  Cleanup  ----  Remove files and directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      with_items:
        - /home/{{ default_user }}/.zshrc
