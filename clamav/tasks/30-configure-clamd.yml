---
- name: ClamAV  ----  clamd  ----  Deploy clamd configuration
  ansible.builtin.template:
    src: clamd.conf.j2
    dest: /etc/clamav/clamd.conf
    owner: root
    group: root
    mode: '0644'
  notify: Restart clamd

- name: ClamAV  ----  clamd  ----  Enable and start daemon
  ansible.builtin.service:
    name: clamav-daemon
    state: started
    enabled: true
