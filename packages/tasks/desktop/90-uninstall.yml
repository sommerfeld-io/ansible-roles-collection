---
- name: Packages Desktop  ----  Ubuntu  ----  Uninstall
  when: ansible_facts['os_family'] == "Debian"
  block:

    - name: Packages Desktop  ----  Ubuntu  ----  Uninstall  ----  Pre-installed packages
      ansible.builtin.apt:
        pkg:
          - thunderbird
          - libreoffice
          - libreoffice-*
          - totem
          - totem-*
        state: absent
        purge: true

    - name: Packages Desktop  ----  Ubuntu  ----  Uninstall  ----  Other packages
      ansible.builtin.apt:
        pkg:
          - asciidoctor
          - yarn
          - google-chrome-stable
          - 7zip-rar
        state: absent
        purge: true

    - name: Packages Desktop  ----  Ubuntu  ----  Uninstall  ----  Pre-installed snap packages
      community.general.snap:
        name:
          - thunderbird
        state: absent
      when: not is_test | default(false)

    - name: Packages Desktop  ----  Ubuntu  ----  Uninstall  ----  Dev Tools
      community.general.snap:
        name:
          - intellij-idea-ultimate
          - intellij-idea-community
          - balena-etcher
        state: absent
      when: not is_test | default(false)

