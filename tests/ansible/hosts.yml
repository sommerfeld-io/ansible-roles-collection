---
all:
  vars:
    ansible_port: 22
    ansible_user: testuser
    ansible_password: testpassword
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
    is_test: true
  children:
    ubuntu:
      hosts:
        ubuntu-under-test-26_04:
          ansible_host: ubuntu-under-test-26_04
        ubuntu-under-test-25_10:
          ansible_host: ubuntu-under-test-25_10
      vars:
        ps1: '${debian_chroot:+($debian_chroot)}\[\033[01;32m\]\u@\h\[\033[00m\]:\[\033[01;34m\]\w\[\033[00m\]$(__git_ps1) $ '
        ps1_root: '${debian_chroot:+($debian_chroot)}\[\033[38;5;213m\]\u@\h\[\033[00m\]:\[\033[01;34m\]\w\[\033[00m\] $ '
