---
- name: Basic Vagrantbox setup
  hosts: all
  gather_facts: true
  become: true
  tasks:
    - name: System Under Test  ----  Info  ----  Display system information
      ansible.builtin.debug:
        msg:
          - "OS Family: {{ ansible_os_family }}"
          - "Distribution: {{ ansible_distribution }}"
          - "Kernel: {{ ansible_kernel }}"
          - "Architecture: {{ ansible_architecture }}"

    - name: System Under Test  ----  Info  ----  Get System info
      shell: |
        echo "Build ID: $(grep BUILD_ID /etc/os-release | cut -d= -f2)"
        echo "Last updated: $(pacman -Qi filesystem | grep 'Install Date' | cut -d: -f2-)"
      register: system_info

    - name: System Under Test  ----  Info  ----  Display System info
      debug:
        var: system_info.stdout_lines

    - name: System Under Test  ----  Update  ----  Update Arch system
      ansible.builtin.include_tasks: tasks/arch/update-system.yml

- name: Run roles against the system under test
  hosts: all
  gather_facts: true
  become: true
  tasks:
    - name: Run Roles  ----  Root  ----  Apply hardening
      ansible.builtin.include_role:
        name: ../hardening
    - name: Run Roles  ----  Root  ----  Apply bash
      ansible.builtin.include_role:
        name: ../bash
    - name: Run Roles  ----  Root  ----  Apply filesystem
      ansible.builtin.include_role:
        name: ../filesystem
    - name: Run Roles  ----  Root  ----  Apply git
      ansible.builtin.include_role:
        name: ../git
    - name: Run Roles  ----  Root  ----  Apply packages (main)
      ansible.builtin.include_role:
        name: ../packages
        tasks_from: main
    - name: Run Roles  ----  Root  ----  Apply packages (desktop)
      ansible.builtin.include_role:
        name: ../packages
        tasks_from: desktop
    - name: Run Roles  ----  Root  ----  Apply docker (main)
      ansible.builtin.include_role:
        name: ../docker
        tasks_from: main
    - name: Run Roles  ----  Root  ----  Apply vscode (main)
      ansible.builtin.include_role:
        name: ../vscode
        tasks_from: main
    - name: Run Roles  ----  Root  ----  Apply cron (main)
      ansible.builtin.include_role:
        name: ../cron
        tasks_from: main
    - name: Run Roles  ----  Root  ----  Apply taskfile-dev
      ansible.builtin.include_role:
        name: ../taskfile-dev
    - name: Run Roles  ----  Root  ----  Apply ansible
      ansible.builtin.include_role:
        name: ../ansible
    - name: Run Roles  ----  Root  ----  Apply conky
      ansible.builtin.include_role:
        name: ../conky
    - name: Run Roles  ----  Root  ----  Apply github-cli
      ansible.builtin.include_role:
        name: ../github-cli

- name: Run roles against the system under test (non-root)
  hosts: all
  gather_facts: true
  become: false
  tasks:
    - name: Run Roles  ----  Non-Root  ----  Apply atuin
      ansible.builtin.include_role:
        name: ../atuin
    - name: Run Roles  ----  Non-Root  ----  Apply cron (jobs)
      ansible.builtin.include_role:
        name: ../cron
        tasks_from: jobs
    - name: Run Roles  ----  Non-Root  ----  Apply docker (scout)
      ansible.builtin.include_role:
        name: ../docker
        tasks_from: scout
    - name: Run Roles  ----  Non-Root  ----  Apply vscode (plugins)
      ansible.builtin.include_role:
        name: ../vscode
        tasks_from: plugins
    - name: Run Roles  ----  Non-Root  ----  Apply kubectl
      ansible.builtin.include_role:
        name: ../kubectl
    - name: Run Roles  ----  Non-Root  ----  Apply helm
      ansible.builtin.include_role:
        name: ../helm
