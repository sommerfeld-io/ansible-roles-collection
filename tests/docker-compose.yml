---
x-tty: &tty true
x-workdir: &default-workdir /workspaces/roles/tests
x-ubuntu-healthcheck: &healthcheck
  test: ["CMD", "sh", "-c", "nc -z localhost 22"]
  interval: 2s
  timeout: 2s
  retries: 15
  start_period: 2s

volumes:
  project-tests-volume:
    driver: local
    driver_opts:
      type: none
      device: .
      o: bind

services:

  lint-ubuntu-26_04:
    image: &hadolint-image hadolint/hadolint:latest
    volumes:
      - project-tests-volume:/workspaces/roles/tests:ro
    working_dir: *default-workdir
    entrypoint: hadolint Dockerfile.ubuntu-26.04
    tty: *tty

  ubuntu-26_04:
    image: local/ubuntu:26.04
    container_name: ubuntu-26_04
    tty: *tty
    command: /usr/sbin/sshd -D
    build:
      context: .
      dockerfile: Dockerfile.ubuntu-26.04
    healthcheck: *healthcheck
    depends_on:
      lint-ubuntu-26_04:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------

  lint-ubuntu-25_10:
    image: *hadolint-image
    volumes:
      - project-tests-volume:/workspaces/roles/tests:ro
    working_dir: *default-workdir
    entrypoint: hadolint Dockerfile.ubuntu-26.04
    tty: *tty

  ubuntu-25_10:
    image: local/ubuntu:25.10
    container_name: ubuntu-25_10
    tty: *tty
    command: /usr/sbin/sshd -D
    build:
      context: .
      dockerfile: Dockerfile.ubuntu-25.10
    healthcheck: *healthcheck
    depends_on:
      lint-ubuntu-25_10:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------

  lint-ubuntu-25_04:
    image: *hadolint-image
    volumes:
      - project-tests-volume:/workspaces/roles/tests:ro
    working_dir: *default-workdir
    entrypoint: hadolint Dockerfile.ubuntu-26.04
    tty: *tty

  ubuntu-25_04:
    image: local/ubuntu:25.04
    container_name: ubuntu-25_04
    tty: *tty
    command: /usr/sbin/sshd -D
    build:
      context: .
      dockerfile: Dockerfile.ubuntu-25.04
    healthcheck: *healthcheck
    depends_on:
      lint-ubuntu-25_04:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------------

  ansible-runner:
    image: alpine/ansible:2.20.0
    container_name: ansible-runner
    volumes:
      - project-tests-volume:/workspaces/roles/tests:ro
      - ../:/workspaces/roles:ro
    working_dir: /workspaces/roles/tests
    entrypoint: ["/bin/sh", "-c"]
    command:
      - ansible-playbook -i ansible/hosts.yml ansible/playbook.yml
    environment:
      - ANSIBLE_HOST_KEY_CHECKING=False
    depends_on:
      ubuntu-26_04:
        condition: service_healthy
      ubuntu-25_10:
        condition: service_healthy
      ubuntu-25_04:
        condition: service_healthy
    tty: *tty
