---
- name: Bash  ----  SSH  ----  Ensure .ssh directory exists
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ default_user }}"
    group: "{{ default_user }}"
    mode: u=rwx,g=rx,o=rx
  with_items:
    - "/home/{{ default_user }}/.ssh"

- name: Bash  ----  SSH  ----  Create ssh keypair
  community.crypto.openssh_keypair:
    path: "/home/{{ default_user }}/.ssh/id_rsa"
    owner: "{{ default_user }}"
    group: "{{ default_user }}"
    type: rsa
    size: 4096
    state: present
    force: false

- name: Bash  ----  SSH  ----  Set permissions for public key
  ansible.builtin.file:
    path: "/home/{{ default_user }}/.ssh/id_rsa.pub"
    mode: '0640'
